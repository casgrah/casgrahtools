<style>

:root {
  --navy:#0a1416; --surface:#0f1e20; --card:#152224; --card2:#1a2b2e;
  --border:#1e3538; --border2:#254043;
  --ink:#ddeef0; --muted:#5a8a90; --muted2:#3d6a70;
  --teal:#2d8a94; --teal-light:#3da8b5; --teal-dim:#1e5f66; --teal-pale:rgba(45,138,148,0.12);
  --terra:#c4673f; --terra-light:#e07a4f; --terra-dim:#7a3820; --terra-pale:rgba(196,103,63,0.12);
  --success:#2d9a5f; --success-pale:rgba(45,154,95,0.12);
  --warn:#d4900a; --warn-pale:rgba(212,144,10,0.12);
  --purple:#8b6fd4; --purple-pale:rgba(139,111,212,0.12);
  --nav-h:64px; --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);min-height:100dvh;}
a{color:inherit;text-decoration:none;}
/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-b));background:var(--navy);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:10px;z-index:200;}
.bnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:2px 0;}
.bnav .ni{font-size:22px;line-height:1;}
.bnav .nl{font-size:10px;font-weight:500;color:var(--muted2);letter-spacing:0.2px;}
.bnav a.active .nl{color:var(--teal);}
.bnav a.active .ni{filter:drop-shadow(0 0 6px rgba(45,138,148,0.6));}
/* Scroll area */
.scroll{padding:16px 16px calc(var(--nav-h) + var(--safe-b) + 20px);}
/* App bar */
.abar{background:var(--navy);padding:48px 20px 14px;border-bottom:3px solid var(--teal);}
.abar.terra{border-bottom-color:var(--terra);}
.abar.purple{border-bottom-color:var(--purple);}
.abar.success{border-bottom-color:var(--success);}
.abar h1{font-family:'Caveat',cursive;font-size:26px;color:var(--ink);font-weight:700;}
.abar .sub{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}
.abar-row{display:flex;align-items:center;justify-content:space-between;}
/* Stat bar */
.statbar{display:grid;gap:10px;padding:12px 16px;background:var(--navy);border-bottom:1px solid var(--border);}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.slabel{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted2);margin-bottom:3px;}
.sval{font-family:'Caveat',cursive;font-size:22px;font-weight:700;color:var(--teal);}
.sval.terra{color:var(--terra);} .sval.success{color:var(--success);} .sval.warn{color:var(--warn);} .sval.dim{color:var(--ink);}
/* Section label */
.slbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted2);margin-bottom:10px;}
/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(5,10,12,0.8);display:flex;align-items:flex-end;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:var(--card);border-radius:24px 24px 0 0;border-top:1px solid var(--border2);padding:20px 20px calc(var(--safe-b) + 24px);width:100%;max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform .25s;}
.modal-bg.open .modal{transform:translateY(0);}
.mhandle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
.mtitle{font-family:'Caveat',cursive;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:16px;}
/* Fields */
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border2);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--card2);outline:none;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);}
.field textarea{resize:vertical;min-height:80px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
/* Buttons */
.btn{padding:10px 18px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btn-teal{background:var(--teal);color:white;}
.btn-terra{background:var(--terra);color:white;}
.btn-success{background:var(--success);color:white;}
.btn-purple{background:var(--purple);color:white;}
.btn-ghost{background:var(--card2);border:1px solid var(--border2);color:var(--muted);}
.btn-full{width:100%;padding:14px;font-family:'Caveat',cursive;font-size:20px;font-weight:700;border-radius:12px;border:none;cursor:pointer;}
.btn-cancel{width:100%;padding:12px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:4px;}
/* FAB */
.fab{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);right:20px;width:56px;height:56px;border-radius:50%;border:none;color:white;font-size:28px;cursor:pointer;z-index:90;display:flex;align-items:center;justify-content:center;transition:transform .15s;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.fab:active{transform:scale(0.92);}
/* Toast */
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--card2);color:var(--ink);border:1px solid var(--border2);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* Badges */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;}
.badge-teal{background:var(--teal-pale);color:var(--teal);}
.badge-terra{background:var(--terra-pale);color:var(--terra);}
.badge-success{background:var(--success-pale);color:var(--success);}
.badge-warn{background:var(--warn-pale);color:var(--warn);}
.badge-purple{background:var(--purple-pale);color:var(--purple);}
/* Icon btn */
.ibtn{background:none;border:none;font-size:16px;cursor:pointer;padding:4px;line-height:1;}
/* Empty state */
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
/* Auth overlay */
#auth-overlay{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:20px;padding:40px;}
#auth-overlay h1{font-family:'Caveat',cursive;font-size:28px;color:var(--ink);font-weight:700;text-align:center;}
#auth-overlay p{font-size:13px;color:var(--muted);text-align:center;max-width:280px;line-height:1.6;}
#sign-in-btn{display:flex;align-items:center;gap:10px;background:white;color:#1e2e30;border:none;border-radius:12px;padding:14px 24px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
#sign-in-btn:active{transform:scale(0.97);}
#sign-in-btn svg{width:20px;height:20px;flex-shrink:0;}
#app{display:none;min-height:100dvh;flex-direction:column;}
#app.visible{display:flex;}

.bmeta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}

.qnum{width:28px;height:28px;border-radius:50%;background:var(--purple-pale);color:var(--purple);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.qtitle{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qauthor{font-size:11px;color:var(--muted);}
.qbtn{background:var(--purple);border:none;color:white;font-family:'DM Sans',sans-serif;font-size:11px;padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;}
.spicker{display:flex;gap:8px;font-size:26px;cursor:pointer;padding:4px 0;}
.src-results{margin-top:8px;border-radius:10px;overflow:hidden;border:1px solid var(--border2);}
.src-result{padding:10px 12px;background:var(--card2);cursor:pointer;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border);}
.src-result:last-child{border-bottom:none;}

.src-cover{width:36px;height:36px;border-radius:6px;object-fit:cover;background:var(--purple-pale);flex-shrink:0;}
.src-title{font-weight:600;font-size:13px;color:var(--ink);}
.src-author{font-size:11px;color:var(--muted);}

</style>

<script>

const CLIENT_ID = '1049044356656-ecjtelk23gknpf1hc7kp3jt2kue56mlg.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';
let accessToken = null;

async function initAuth(tokenKey) {
  const s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  document.head.appendChild(s);
  await new Promise(r => s.onload = r);
  const stored = localStorage.getItem(tokenKey);
  if (stored) { accessToken = stored; showApp(); return; }
  document.getElementById('sign-in-btn').onclick = () => {
    google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: r => {
        if (r.access_token) {
          accessToken = r.access_token;
          localStorage.setItem(tokenKey, r.access_token);
          showApp();
        }
      }
    }).requestAccessToken({prompt:''});
  };
}

function signOut(tokenKey) {
  accessToken = null;
  localStorage.removeItem(tokenKey);
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-overlay').style.display='flex';
}

async function sheetsGet(range, sid) {
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(range)}`,{headers:{Authorization:`Bearer ${accessToken}`}});
  if(!r.ok) throw new Error(r.status);
  return (await r.json()).values || [];
}
async function sheetsPut(range, values, sid) {
  return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,{method:'PUT',headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({range,majorDimension:'ROWS',values})});
}
async function sheetsAppend(range, values, sid) {
  return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,{method:'POST',headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({range,majorDimension:'ROWS',values})});
}
async function sheetsClear(range, sid) {
  return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(range)}:clear`,{method:'POST',headers:{Authorization:`Bearer ${accessToken}`}});
}
async function getSheetTitles(sid) {
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}`,{headers:{Authorization:`Bearer ${accessToken}`}});
  return (await r.json()).sheets.map(s=>s.properties.title);
}
async function addSheetTab(title, sid) {
  return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}:batchUpdate`,{method:'POST',headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({requests:[{addSheet:{properties:{title}}}]})});
}

let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2500);}

async function showApp() {
  document.getElementById('auth-overlay').style.display='none';
  document.getElementById('app').classList.add('visible');
  await ensureBooksSheet();
  await loadBooks();
  render();
}

async function ensureBooksSheet() {
  try {
    const sheets = await getSheetTitles(BOOKS_SID);
    if(!sheets.includes('Books')) {
      await addSheetTab('Books', BOOKS_SID);
      await sheetsPut('Books!A1:K1',[['ID','Title','Author','Narrator','Status','Cover','DateFinished','Genre','Review','BookRating','NarratorRating']],BOOKS_SID);
    }
  } catch(e) { console.error(e); }
}

async function loadBooks() {
  try {
    const rows = await sheetsGet('Books!A2:K1000', BOOKS_SID);
    books = rows.filter(r=>r[0]).map((r,i)=>({
      id:r[0]||'', title:r[1]||'', author:r[2]||'', narrator:r[3]||'',
      status:r[4]||'queue', cover:r[5]||'', dateFinished:r[6]||'',
      genre:r[7]||'', review:r[8]||'',
      rating:parseInt(r[9])||0, narratorRating:parseInt(r[10])||0,
      _row:i+2
    }));
    localStorage.setItem('cgt_books', JSON.stringify(books));
  } catch(e) { books=JSON.parse(localStorage.getItem('cgt_books')||'[]'); }
}

async function saveBookToSheet(b, isNew) {
  const row=[b.id,b.title,b.author,b.narrator,b.status,b.cover,b.dateFinished,b.genre,b.review,b.rating||0,b.narratorRating||0];
  if(isNew) {
    await sheetsAppend('Books!A2:K',[row],BOOKS_SID);
    const rows = await sheetsGet('Books!A2:A1000',BOOKS_SID);
    b._row=rows.length+1;
  } else {
    await sheetsPut(`Books!A${b._row}:K${b._row}`,[row],BOOKS_SID);
  }
  localStorage.setItem('cgt_books',JSON.stringify(books));
}

async function deleteBookFromSheet(b) {
  if(b._row) await sheetsClear(`Books!A${b._row}:K${b._row}`,BOOKS_SID);
  localStorage.setItem('cgt_books',JSON.stringify(books));
}

function setTab(tab){currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active');render();}

function render(){
  const area=document.getElementById('scrollArea');
  const filtered=books.filter(b=>b.status===currentTab);
  if(currentTab==='listening'){
    if(!filtered.length){area.innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:12px">🎧</div><p>Nothing playing yet!</p></div>';return;}
    area.innerHTML=filtered.map(b=>`<div class="now-card">
      ${b.cover?`<img class="now-cover" src="${b.cover}" onerror="this.style.display='none'">`:('<div class="now-ph">📚</div>')}
      <div class="now-info">
        <div class="now-lbl">Now Listening</div>
        <div class="now-title">${b.title}</div>
        <div class="now-author">${b.author||''}</div>
        <div class="now-narrator">${b.narrator?'🎙️ '+b.narrator:''}</div>
        <div class="now-acts">
          <button class="now-btn" onclick="editBook('${b.id}')">Edit</button>
          <button class="now-btn fin" onclick="finishBook('${b.id}')">✓ Finished</button>
        </div>
      </div></div>`).join('');
    return;
  }
  if(currentTab==='finished'){
    if(!filtered.length){area.innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:12px">📚</div><p>No finished books yet!</p></div>';return;}
    const sorted=[...filtered].sort((a,b)=>(b.dateFinished||'').localeCompare(a.dateFinished||''));
    area.innerHTML=sorted.map(b=>`<div class="bcard">
      ${b.cover?`<img class="bcover" src="${b.cover}" onerror="this.style.display='none'">`:('<div class="bcover-ph">📚</div>')}
      <div class="binfo">
        <div class="btitle">${b.title}</div>
        <div class="bauthor">${b.author||''}</div>
        ${b.narrator?`<div class="bnarr">🎙️ ${b.narrator}</div>`:''}
        <div class="bmeta">
          ${b.rating?`<span class="bstars">${'⭐'.repeat(b.rating)}</span>`:''}
          ${b.narratorRating?`<span style="font-size:11px;color:var(--muted)">🎙️×${b.narratorRating}</span>`:''}
          ${b.dateFinished?`<span class="bdate">${b.dateFinished}</span>`:''}
          ${b.genre?`<span class="badge badge-purple">${b.genre}</span>`:''}
        </div>
        ${b.review?`<div class="breview">${b.review}</div>`:''}
      </div>
      <div class="bacts">
        <button class="ibtn" onclick="editBook('${b.id}')">✏️</button>
        <button class="ibtn" onclick="deleteBook('${b.id}')">🗑️</button>
      </div></div>`).join('');
    return;
  }
  if(currentTab==='queue'){
    if(!filtered.length){area.innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:12px">🗂️</div><p>Queue is empty!</p></div>';return;}
    area.innerHTML=filtered.map((b,i)=>`<div class="qcard">
      <div class="qnum">${i+1}</div>
      <div class="qinfo"><div class="qtitle">${b.title}</div><div class="qauthor">${b.author||''}</div></div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="qbtn" onclick="startListening('${b.id}')">▶ Start</button>
        <button class="ibtn" onclick="deleteBook('${b.id}')">🗑️</button>
      </div></div>`).join('');
  }
}

async function searchBooks(){
  const q=document.getElementById('searchInput').value.trim();
  const results=document.getElementById('searchResults');
  if(q.length<3){results.style.display='none';return;}
  clearTimeout(searchTimer);
  if(searchAbort){searchAbort.abort();}
  searchTimer=setTimeout(async()=>{
    searchAbort=new AbortController();
    try{
      const res=await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&fields=title,author_name,cover_i&limit=5`,{signal:searchAbort.signal});
      const data=await res.json();
      if(!data.docs?.length){results.style.display='none';return;}
      results.style.display='block';
      results.innerHTML='';
      data.docs.forEach(d=>{
        const cover=d.cover_i?`https://covers.openlibrary.org/b/id/${d.cover_i}-S.jpg`:'';
        const author=d.author_name?.[0]||'';
        const el=document.createElement('div');
        el.className='src-result';
        el.dataset.title=d.title;
        el.dataset.author=author;
        el.dataset.cover=cover;
        el.innerHTML=`${cover?`<img class="src-cover" src="${cover}">`:('<div class="src-cover" style="display:flex;align-items:center;justify-content:center;font-size:18px;">📚</div>')}<div><div class="src-title">${d.title}</div><div class="src-author">${author}</div></div>`;
        el.addEventListener('click',()=>selectBook(el.dataset.title,el.dataset.author,el.dataset.cover));
        results.appendChild(el);
      });
    }catch(e){if(e.name!=='AbortError')results.style.display='none';}
  },500);
}

function selectBook(title,author,cover){
  document.getElementById('bookTitle').value=title;
  document.getElementById('bookAuthor').value=author;
  document.getElementById('bookCover').value=cover;
  document.getElementById('searchResults').style.display='none';
  document.getElementById('searchInput').value='';
}

function setStars(type,n){
  document.getElementById(type==='book'?'bookRating':'narratorRating').value=n;
  const el=document.getElementById(type==='book'?'bookStars':'narratorStars');
  const icon=type==='book'?'⭐':'🎙️';
  el.innerHTML=[1,2,3,4,5].map(i=>`<span onclick="setStars('${type}',${i})" style="opacity:${i<=n?1:0.25}">${icon}</span>`).join('');
}
function initStars(br,nr){['book','narrator'].forEach(t=>setStars(t,t==='book'?br:nr));}

function openAdd(){
  document.getElementById('modalTitle').textContent='Add Audiobook';
  document.getElementById('bookId').value='';
  ['bookTitle','bookAuthor','bookNarrator','bookGenre','bookReview'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('bookStatus').value=currentTab==='queue'?'queue':currentTab==='finished'?'finished':'listening';
  document.getElementById('bookCover').value='';
  document.getElementById('bookDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('bookRating').value=0;
  document.getElementById('narratorRating').value=0;
  document.getElementById('searchResults').style.display='none';
  initStars(0,0); updateModalFields();
  document.getElementById('addModal').classList.add('open');
}

function editBook(id){
  const b=books.find(x=>x.id===id);if(!b)return;
  document.getElementById('modalTitle').textContent='Edit Audiobook';
  document.getElementById('bookId').value=b.id;
  document.getElementById('bookTitle').value=b.title||'';
  document.getElementById('bookAuthor').value=b.author||'';
  document.getElementById('bookNarrator').value=b.narrator||'';
  document.getElementById('bookStatus').value=b.status||'listening';
  document.getElementById('bookCover').value=b.cover||'';
  document.getElementById('bookDate').value=b.dateFinished||'';
  document.getElementById('bookGenre').value=b.genre||'';
  document.getElementById('bookReview').value=b.review||'';
  document.getElementById('bookRating').value=b.rating||0;
  document.getElementById('narratorRating').value=b.narratorRating||0;
  document.getElementById('searchResults').style.display='none';
  initStars(b.rating||0,b.narratorRating||0); updateModalFields();
  document.getElementById('addModal').classList.add('open');
}

function updateModalFields(){document.getElementById('finishedFields').style.display=document.getElementById('bookStatus').value==='finished'?'':'none';}
function closeModal(){document.getElementById('addModal').classList.remove('open');}

async function saveBook(){
  const title=document.getElementById('bookTitle').value.trim();
  if(!title){toast('Please enter a title');return;}
  const id=document.getElementById('bookId').value||Date.now().toString();
  const idx=books.findIndex(b=>b.id===id);
  const entry={id,title,author:document.getElementById('bookAuthor').value.trim(),narrator:document.getElementById('bookNarrator').value.trim(),status:document.getElementById('bookStatus').value,cover:document.getElementById('bookCover').value,dateFinished:document.getElementById('bookDate').value,genre:document.getElementById('bookGenre').value.trim(),review:document.getElementById('bookReview').value.trim(),rating:parseInt(document.getElementById('bookRating').value)||0,narratorRating:parseInt(document.getElementById('narratorRating').value)||0,_row:idx>=0?books[idx]._row:null};
  if(idx>=0)books[idx]=entry;else books.push(entry);
  closeModal();
  try{await saveBookToSheet(entry,idx<0);toast(idx>=0?'Updated!':'Added!');}
  catch(e){toast('Saved locally — sync failed');}
  render();
}

async function deleteBook(id){
  if(!confirm('Delete this book?'))return;
  const b=books.find(x=>x.id===id);if(!b)return;
  books=books.filter(x=>x.id!==id);
  try{await deleteBookFromSheet(b);}catch(e){}
  render(); toast('Deleted');
}

async function finishBook(id){
  const b=books.find(x=>x.id===id);if(!b)return;
  b.status='finished';b.dateFinished=new Date().toISOString().split('T')[0];
  try{await saveBookToSheet(b,false);}catch(e){}
  editBook(id);
}

async function startListening(id){
  const b=books.find(x=>x.id===id);if(!b)return;
  b.status='listening';
  try{await saveBookToSheet(b,false);}catch(e){}
  setTab('listening'); toast('Started: '+b.title);
}

document.getElementById('addModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
initAuth('cgt_token');
</script></body></html>
