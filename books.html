<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a1416">
<title>Audiobooks · casgrahtools</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --teal:#2d8a94;--teal-light:#3da8b5;--teal-dim:#1e5f66;--teal-pale:rgba(45,138,148,0.13);
  --terra:#c4673f;--terra-light:#e07a4f;--terra-dim:#7a3820;--terra-pale:rgba(196,103,63,0.13);
  --navy:#0a1416;--surface:#0f1e20;--card:#152224;--card2:#1a2b2e;
  --border:#1e3538;--border2:#254043;
  --ink:#ddeef0;--muted:#5a8a90;--muted2:#3d6a70;
  --success:#2d9a5f;--success-pale:rgba(45,154,95,0.13);
  --purple:#8b6fd4;--purple-pale:rgba(139,111,212,0.13);
  --warn:#d4900a;--warn-pale:rgba(212,144,10,0.13);
  --nav-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);min-height:100dvh;}
.app-bar{background:var(--navy);padding:48px 20px 14px;border-bottom:3px solid var(--purple);}
.app-bar h1{font-family:'Caveat',cursive;font-size:26px;color:var(--ink);font-weight:700;}
.app-bar .subtitle{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}
.tabs{display:flex;background:var(--navy);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;}
.tab.active{color:var(--purple);border-bottom-color:var(--purple);}
.scroll-area{padding:16px 16px calc(var(--nav-h) + var(--safe-bottom) + 16px);}
.fab{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);right:20px;width:56px;height:56px;border-radius:50%;background:var(--purple);border:none;color:white;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(139,111,212,0.35);z-index:90;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.fab:active{transform:scale(0.92);}
.now-card{background:linear-gradient(135deg,var(--card),var(--card2));border-radius:18px;padding:18px;display:flex;gap:14px;margin-bottom:20px;border:1px solid var(--border2);}
.now-cover{width:72px;height:72px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.now-cover-placeholder{width:72px;height:72px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;border:1px solid var(--border);}
.now-info{flex:1;min-width:0;}
.now-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted2);margin-bottom:4px;}
.now-title{font-family:'Caveat',cursive;font-size:20px;color:var(--ink);font-weight:700;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.now-author{font-size:12px;color:var(--muted);margin-top:2px;}
.now-narrator{font-size:11px;color:var(--muted2);margin-top:2px;font-style:italic;}
.now-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.now-btn{background:var(--card2);border:1px solid var(--border2);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;padding:6px 12px;border-radius:20px;cursor:pointer;}
.now-btn.finish{background:var(--purple);color:white;border-color:transparent;}
.book-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;display:flex;gap:12px;margin-bottom:10px;}
.book-card:active{background:var(--card2);}
.book-cover{width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.book-cover-ph{width:56px;height:56px;border-radius:8px;background:var(--purple-pale);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.book-info{flex:1;min-width:0;}
.book-title{font-weight:600;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.book-author{font-size:12px;color:var(--muted);margin-top:1px;}
.book-narrator{font-size:11px;color:var(--muted2);font-style:italic;margin-top:1px;}
.book-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}
.stars{font-size:12px;letter-spacing:1px;}
.book-date{font-size:10px;color:var(--muted2);}
.book-review{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.book-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;}
.icon-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:4px;}
.queue-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;display:flex;gap:12px;margin-bottom:10px;align-items:center;}
.queue-num{width:28px;height:28px;border-radius:50%;background:var(--purple-pale);color:var(--purple);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.queue-info{flex:1;min-width:0;}
.queue-title{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.queue-author{font-size:11px;color:var(--muted);}
.queue-btn{background:var(--purple);border:none;color:white;font-family:'DM Sans',sans-serif;font-size:11px;padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;}
.empty-state{text-align:center;padding:44px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(5,10,12,.75);display:flex;align-items:flex-end;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:20px 20px calc(var(--safe-bottom) + 20px);width:100%;max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform .25s;border-top:1px solid var(--border2);}
.modal-bg.open .modal{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-family:'Caveat',cursive;font-size:22px;font-weight:700;margin-bottom:16px;color:var(--ink);}
.field{margin-bottom:12px;}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:block;margin-bottom:4px;}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--border2);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--card2);outline:none;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--purple);}
.field textarea{resize:vertical;min-height:80px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.star-picker{display:flex;gap:8px;font-size:26px;cursor:pointer;padding:4px 0;}
.search-results{margin-top:8px;border-radius:10px;overflow:hidden;border:1px solid var(--border2);}
.search-result{padding:10px 12px;background:var(--card2);cursor:pointer;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border);}
.search-result:last-child{border-bottom:none;}
.search-result:active{background:var(--teal-pale);}
.search-cover{width:36px;height:36px;border-radius:6px;object-fit:cover;background:var(--purple-pale);flex-shrink:0;}
.search-title{font-weight:600;font-size:13px;color:var(--ink);}
.search-author{font-size:11px;color:var(--muted);}
.submit-btn{width:100%;padding:14px;background:var(--purple);color:white;border:none;border-radius:12px;font-family:'Caveat',cursive;font-size:20px;font-weight:700;cursor:pointer;margin-top:8px;}
.submit-btn:active{opacity:.85;}
.cancel-link{width:100%;padding:12px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:4px;display:block;text-align:center;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bottom));background:var(--navy);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;padding:4px 0;}
.nav-icon{font-size:22px;line-height:1;}
.nav-label{font-size:10px;font-weight:500;color:var(--muted2);}
.nav-item.active .nav-label{color:var(--teal);}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 5px rgba(45,138,148,0.5));}
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);color:var(--ink);border:1px solid var(--border2);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

</style>
</head>
<body>
<div class="app-bar">
  <h1>🎧 Audiobooks</h1>
  <div class="subtitle">your listening log</div>
</div>
<div class="tabs">
  <div class="tab active" onclick="setTab('listening')" id="tab-listening">Now Playing</div>
  <div class="tab" onclick="setTab('finished')" id="tab-finished">Finished</div>
  <div class="tab" onclick="setTab('queue')" id="tab-queue">Queue</div>
</div>
<div class="scroll-area" id="scrollArea"></div>
<button class="fab" onclick="openAdd()">+</button>

<nav class="bottom-nav">
  <a class="nav-item " href="index.html"><span class="nav-icon">🏡</span><span class="nav-label">Home</span></a>
  <a class="nav-item " href="bills.html"><span class="nav-icon">💰</span><span class="nav-label">Bills</span></a>
  <a class="nav-item " href="cxc.html"><span class="nav-icon">🦕</span><span class="nav-label">CXC</span></a>
  <a class="nav-item active" href="books.html"><span class="nav-icon">🎧</span><span class="nav-label">Books</span></a>
  <a class="nav-item " href="plants.html"><span class="nav-icon">🌱</span><span class="nav-label">Plants</span></a>
</nav>

<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Add Audiobook</div>
    <div class="field">
      <label>Search by Title or Author</label>
      <input type="text" id="searchInput" placeholder="e.g. Project Hail Mary" oninput="searchBooks()">
      <div class="search-results" id="searchResults" style="display:none"></div>
    </div>
    <div class="field"><label>Title</label><input type="text" id="bookTitle" placeholder="Book title"></div>
    <div class="field-row">
      <div class="field"><label>Author</label><input type="text" id="bookAuthor" placeholder="Author"></div>
      <div class="field"><label>Narrator</label><input type="text" id="bookNarrator" placeholder="Narrator"></div>
    </div>
    <div class="field"><label>Status</label>
      <select id="bookStatus" onchange="updateModalFields()">
        <option value="listening">Currently Listening</option>
        <option value="finished">Finished</option>
        <option value="queue">Want to Listen</option>
      </select>
    </div>
    <div id="finishedFields">
      <div class="field"><label>Book Rating</label><div class="star-picker" id="bookStars">⭐⭐⭐⭐⭐</div></div>
      <div class="field"><label>Narrator Rating</label><div class="star-picker" id="narratorStars">🎙️🎙️🎙️🎙️🎙️</div></div>
      <div class="field-row">
        <div class="field"><label>Date Finished</label><input type="date" id="bookDate"></div>
        <div class="field"><label>Genre</label><input type="text" id="bookGenre" placeholder="e.g. Sci-Fi"></div>
      </div>
      <div class="field"><label>Review / Notes</label><textarea id="bookReview" placeholder="What did you think?"></textarea></div>
    </div>
    <input type="hidden" id="bookCover">
    <input type="hidden" id="bookId">
    <input type="hidden" id="bookRating" value="0">
    <input type="hidden" id="narratorRating" value="0">
    <button class="submit-btn" onclick="saveBook()">Save 🎧</button>
    <button class="cancel-link" onclick="closeModal()">Cancel</button>
  </div>
</div>
<div id="toast"></div>
<script>
let books=JSON.parse(localStorage.getItem('cgt_books')||'[]');
let currentTab='listening';
let searchTimer=null;
function save(){localStorage.setItem('cgt_books',JSON.stringify(books));}
function setTab(tab){currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active');render();}
function render(){
  const area=document.getElementById('scrollArea');
  const filtered=books.filter(b=>b.status===currentTab);
  if(currentTab==='listening'){
    if(!filtered.length){area.innerHTML='<div class="empty-state"><div class="empty-icon">🎧</div><p>Nothing playing yet!</p></div>';return;}
    area.innerHTML=filtered.map(b=>`<div class="now-card">
      ${b.cover?`<img class="now-cover" src="${b.cover}" onerror="this.style.display='none'">`:('<div class="now-cover-placeholder">📚</div>')}
      <div class="now-info">
        <div class="now-label">Now Listening</div>
        <div class="now-title">${b.title}</div>
        <div class="now-author">${b.author||''}</div>
        <div class="now-narrator">${b.narrator?'🎙️ '+b.narrator:''}</div>
        <div class="now-actions">
          <button class="now-btn" onclick="editBook('${b.id}')">Edit</button>
          <button class="now-btn finish" onclick="finishBook('${b.id}')">✓ Finished</button>
        </div>
      </div></div>`).join('');
    return;
  }
  if(currentTab==='finished'){
    if(!filtered.length){area.innerHTML='<div class="empty-state"><div class="empty-icon">📚</div><p>No finished books yet!</p></div>';return;}
    const sorted=[...filtered].sort((a,b)=>(b.dateFinished||'').localeCompare(a.dateFinished||''));
    area.innerHTML=sorted.map(b=>`<div class="book-card">
      ${b.cover?`<img class="book-cover" src="${b.cover}" onerror="this.style.display='none'">`:('<div class="book-cover-ph">📚</div>')}
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author||''}</div>
        ${b.narrator?`<div class="book-narrator">🎙️ ${b.narrator}</div>`:''}
        <div class="book-meta">
          ${b.rating?`<span class="stars">${'⭐'.repeat(b.rating)}</span>`:''}
          ${b.narratorRating?`<span style="font-size:11px;color:var(--muted)">🎙️×${b.narratorRating}</span>`:''}
          ${b.dateFinished?`<span class="book-date">${b.dateFinished}</span>`:''}
          ${b.genre?`<span class="book-date" style="background:var(--purple-pale);color:var(--purple);padding:2px 7px;border-radius:8px;">${b.genre}</span>`:''}
        </div>
        ${b.review?`<div class="book-review">${b.review}</div>`:''}
      </div>
      <div class="book-actions">
        <button class="icon-btn" onclick="editBook('${b.id}')">✏️</button>
        <button class="icon-btn" onclick="deleteBook('${b.id}')">🗑️</button>
      </div></div>`).join('');
    return;
  }
  if(currentTab==='queue'){
    if(!filtered.length){area.innerHTML='<div class="empty-state"><div class="empty-icon">🗂️</div><p>Queue is empty!</p></div>';return;}
    area.innerHTML=filtered.map((b,i)=>`<div class="queue-card">
      <div class="queue-num">${i+1}</div>
      <div class="queue-info"><div class="queue-title">${b.title}</div><div class="queue-author">${b.author||''}</div></div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="queue-btn" onclick="startListening('${b.id}')">▶ Start</button>
        <button class="icon-btn" onclick="deleteBook('${b.id}')">🗑️</button>
      </div></div>`).join('');
  }
}
async function searchBooks(){
  const q=document.getElementById('searchInput').value.trim();
  const results=document.getElementById('searchResults');
  if(q.length<3){results.style.display='none';return;}
  clearTimeout(searchTimer);
  searchTimer=setTimeout(async()=>{
    try{
      const res=await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&fields=title,author_name,cover_i,key&limit=5`);
      const data=await res.json();
      if(!data.docs?.length){results.style.display='none';return;}
      results.style.display='block';
      results.innerHTML=data.docs.map(d=>{
        const cover=d.cover_i?`https://covers.openlibrary.org/b/id/${d.cover_i}-S.jpg`:'';
        const author=d.author_name?.[0]||'';
        return`<div class="search-result" onclick="selectBook('${esc(d.title)}','${esc(author)}','${cover}')">
          ${cover?`<img class="search-cover" src="${cover}">`:('<div class="search-cover" style="display:flex;align-items:center;justify-content:center;font-size:18px;">📚</div>')}
          <div><div class="search-title">${d.title}</div><div class="search-author">${author}</div></div>
        </div>`;
      }).join('');
    }catch(e){results.style.display='none';}
  },400);
}
function esc(s){return(s||'').replace(/'/g,"\'");}
function selectBook(title,author,cover){
  document.getElementById('bookTitle').value=title;
  document.getElementById('bookAuthor').value=author;
  document.getElementById('bookCover').value=cover;
  document.getElementById('searchResults').style.display='none';
  document.getElementById('searchInput').value='';
}
function setStars(type,n){
  document.getElementById(type==='book'?'bookRating':'narratorRating').value=n;
  const el=document.getElementById(type==='book'?'bookStars':'narratorStars');
  const icon=type==='book'?'⭐':'🎙️';
  el.innerHTML=[1,2,3,4,5].map(i=>`<span onclick="setStars('${type}',${i})" style="opacity:${i<=n?1:0.25}">${icon}</span>`).join('');
}
function initStars(br,nr){
  ['book','narrator'].forEach(t=>{
    const n=t==='book'?br:nr;
    const el=document.getElementById(t==='book'?'bookStars':'narratorStars');
    const icon=t==='book'?'⭐':'🎙️';
    el.innerHTML=[1,2,3,4,5].map(i=>`<span onclick="setStars('${t}',${i})" style="opacity:${i<=n?1:0.25}">${icon}</span>`).join('');
  });
}
function openAdd(){
  document.getElementById('modalTitle').textContent='Add Audiobook';
  document.getElementById('bookId').value='';
  ['bookTitle','bookAuthor','bookNarrator','bookGenre','bookReview'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('bookStatus').value=currentTab==='queue'?'queue':currentTab==='finished'?'finished':'listening';
  document.getElementById('bookCover').value='';
  document.getElementById('bookDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('bookRating').value=0;
  document.getElementById('narratorRating').value=0;
  document.getElementById('searchResults').style.display='none';
  initStars(0,0); updateModalFields();
  document.getElementById('addModal').classList.add('open');
}
function editBook(id){
  const b=books.find(x=>x.id===id);if(!b)return;
  document.getElementById('modalTitle').textContent='Edit Audiobook';
  document.getElementById('bookId').value=b.id;
  document.getElementById('bookTitle').value=b.title||'';
  document.getElementById('bookAuthor').value=b.author||'';
  document.getElementById('bookNarrator').value=b.narrator||'';
  document.getElementById('bookStatus').value=b.status||'listening';
  document.getElementById('bookCover').value=b.cover||'';
  document.getElementById('bookDate').value=b.dateFinished||'';
  document.getElementById('bookGenre').value=b.genre||'';
  document.getElementById('bookReview').value=b.review||'';
  document.getElementById('bookRating').value=b.rating||0;
  document.getElementById('narratorRating').value=b.narratorRating||0;
  document.getElementById('searchResults').style.display='none';
  initStars(b.rating||0,b.narratorRating||0); updateModalFields();
  document.getElementById('addModal').classList.add('open');
}
function updateModalFields(){
  document.getElementById('finishedFields').style.display=document.getElementById('bookStatus').value==='finished'?'':'none';
}
function closeModal(){document.getElementById('addModal').classList.remove('open');}
function saveBook(){
  const title=document.getElementById('bookTitle').value.trim();
  if(!title){toast('Please enter a title');return;}
  const id=document.getElementById('bookId').value||Date.now().toString();
  const idx=books.findIndex(b=>b.id===id);
  const entry={id,title,author:document.getElementById('bookAuthor').value.trim(),narrator:document.getElementById('bookNarrator').value.trim(),status:document.getElementById('bookStatus').value,cover:document.getElementById('bookCover').value,dateFinished:document.getElementById('bookDate').value,genre:document.getElementById('bookGenre').value.trim(),review:document.getElementById('bookReview').value.trim(),rating:parseInt(document.getElementById('bookRating').value)||0,narratorRating:parseInt(document.getElementById('narratorRating').value)||0,addedAt:idx>=0?books[idx].addedAt:new Date().toISOString()};
  if(idx>=0)books[idx]=entry;else books.push(entry);
  save();closeModal();render();toast(idx>=0?'Updated!':'Added!');
}
function deleteBook(id){if(!confirm('Delete this book?'))return;books=books.filter(b=>b.id!==id);save();render();toast('Deleted');}
function finishBook(id){const b=books.find(x=>x.id===id);if(!b)return;b.status='finished';b.dateFinished=new Date().toISOString().split('T')[0];save();editBook(id);}
function startListening(id){const b=books.find(x=>x.id===id);if(!b)return;b.status='listening';save();setTab('listening');toast('Started: '+b.title);}
let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2500);}
