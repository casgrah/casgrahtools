<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>casgrahtools</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0f1e20;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
.logo-wrap{width:96px;height:96px;border-radius:50%;background:#172425;border:2px solid #2d6b73;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
h1{font-family:'Caveat',cursive;font-size:32px;color:#fff;font-weight:700;letter-spacing:0.5px;margin-bottom:4px;text-align:center;}
.sub{font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:48px;text-align:center;}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:560px;}
.card{background:#172425;border:1px solid #2a3d3f;border-radius:16px;padding:32px 28px;text-decoration:none;transition:all 0.2s ease;display:flex;flex-direction:column;gap:12px;}
.card:hover{transform:translateY(-4px);border-color:#2d6b73;background:#1d2e30;}
.card.terra:hover{border-color:#b85c38;}
.card-icon{font-size:28px;line-height:1;}
.card-title{font-family:'Caveat',cursive;font-size:24px;color:#fff;font-weight:700;line-height:1.1;}
.card-desc{font-size:12px;color:rgba(255,255,255,0.45);line-height:1.6;}
.card-arrow{font-size:18px;color:#2d6b73;margin-top:auto;padding-top:8px;}
.card.terra .card-arrow{color:#b85c38;}
.footer{margin-top:40px;font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:1px;}
@media(max-width:480px){.cards{grid-template-columns:1fr;max-width:320px;}}
</style>
</head>
<body>
<div class="logo-wrap">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="72" height="72">
  <!-- plates -->
  <polygon points="38,38 42,18 46,38" fill="#2d6b73" opacity="0.9"/>
  <polygon points="46,36 52,14 57,36" fill="#2d6b73" opacity="0.9"/>
  <polygon points="55,35 62,10 68,35" fill="#2d6b73" opacity="0.9"/>
  <polygon points="64,36 70,16 75,36" fill="#2d6b73" opacity="0.9"/>
  <polygon points="72,38 77,22 81,38" fill="#2d6b73" opacity="0.9"/>
  <!-- body -->
  <ellipse cx="60" cy="50" rx="32" ry="16" fill="#2d6b73"/>
  <!-- head -->
  <ellipse cx="24" cy="46" rx="12" ry="10" fill="#2d6b73"/>
  <!-- snout -->
  <ellipse cx="13" cy="50" rx="7" ry="5" fill="#2d6b73"/>
  <!-- eye -->
  <circle cx="20" cy="42" r="2.5" fill="#0f1e20"/>
  <circle cx="19" cy="41" r="1" fill="rgba(255,255,255,0.4)"/>
  <!-- legs -->
  <rect x="35" y="62" width="8" height="14" rx="3" fill="#2d6b73"/>
  <rect x="48" y="64" width="8" height="12" rx="3" fill="#2d6b73"/>
  <rect x="64" y="64" width="8" height="12" rx="3" fill="#2d6b73"/>
  <rect x="77" y="62" width="8" height="14" rx="3" fill="#2d6b73"/>
  <!-- tail -->
  <path d="M92,50 Q105,45 112,52 Q105,55 92,54 Z" fill="#2d6b73"/>
  <!-- tail spikes -->
  <polygon points="100,48 104,40 107,49" fill="#2d6b73" opacity="0.85"/>
  <polygon points="107,47 111,40 113,48" fill="#2d6b73" opacity="0.7"/>
</svg>
</div>
<h1>casgrahtools</h1>
<p class="sub">personal toolkit</p>
<div class="cards">
  <a class="card" href="bills.html">
    <div class="card-icon">🏠</div>
    <div class="card-title">Bills Tracker</div>
    <div class="card-desc">Monthly bills, income, payments &amp; annual overview — synced to Google Sheets</div>
    <div class="card-arrow">→</div>
  </a>
  <a class="card terra" href="cxc.html">
    <div class="card-icon">🦕</div>
    <div class="card-title">CXC Income Tracker</div>
    <div class="card-desc">Orders, expenses, shipping P&amp;L and profit margins for CreationsxCaitlin</div>
    <div class="card-arrow">→</div>
  </a>
</div>
<div class="footer">casgrah · built with 🦕 energy</div>
</body>
</html>
