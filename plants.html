<style>

:root {
  --navy:#0a1416; --surface:#0f1e20; --card:#152224; --card2:#1a2b2e;
  --border:#1e3538; --border2:#254043;
  --ink:#ddeef0; --muted:#5a8a90; --muted2:#3d6a70;
  --teal:#2d8a94; --teal-light:#3da8b5; --teal-dim:#1e5f66; --teal-pale:rgba(45,138,148,0.12);
  --terra:#c4673f; --terra-light:#e07a4f; --terra-dim:#7a3820; --terra-pale:rgba(196,103,63,0.12);
  --success:#2d9a5f; --success-pale:rgba(45,154,95,0.12);
  --warn:#d4900a; --warn-pale:rgba(212,144,10,0.12);
  --purple:#8b6fd4; --purple-pale:rgba(139,111,212,0.12);
  --nav-h:64px; --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);min-height:100dvh;}
a{color:inherit;text-decoration:none;}
/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-b));background:var(--navy);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:10px;z-index:200;}
.bnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:2px 0;}
.bnav .ni{font-size:22px;line-height:1;}
.bnav .nl{font-size:10px;font-weight:500;color:var(--muted2);letter-spacing:0.2px;}
.bnav a.active .nl{color:var(--teal);}
.bnav a.active .ni{filter:drop-shadow(0 0 6px rgba(45,138,148,0.6));}
/* Scroll area */
.scroll{padding:16px 16px calc(var(--nav-h) + var(--safe-b) + 20px);}
/* App bar */
.abar{background:var(--navy);padding:48px 20px 14px;border-bottom:3px solid var(--teal);}
.abar.terra{border-bottom-color:var(--terra);}
.abar.purple{border-bottom-color:var(--purple);}
.abar.success{border-bottom-color:var(--success);}
.abar h1{font-family:'Caveat',cursive;font-size:26px;color:var(--ink);font-weight:700;}
.abar .sub{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}
.abar-row{display:flex;align-items:center;justify-content:space-between;}
/* Stat bar */
.statbar{display:grid;gap:10px;padding:12px 16px;background:var(--navy);border-bottom:1px solid var(--border);}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.slabel{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted2);margin-bottom:3px;}
.sval{font-family:'Caveat',cursive;font-size:22px;font-weight:700;color:var(--teal);}
.sval.terra{color:var(--terra);} .sval.success{color:var(--success);} .sval.warn{color:var(--warn);} .sval.dim{color:var(--ink);}
/* Section label */
.slbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted2);margin-bottom:10px;}
/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(5,10,12,0.8);display:flex;align-items:flex-end;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:var(--card);border-radius:24px 24px 0 0;border-top:1px solid var(--border2);padding:20px 20px calc(var(--safe-b) + 24px);width:100%;max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform .25s;}
.modal-bg.open .modal{transform:translateY(0);}
.mhandle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
.mtitle{font-family:'Caveat',cursive;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:16px;}
/* Fields */
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border2);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--card2);outline:none;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);}
.field textarea{resize:vertical;min-height:80px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
/* Buttons */
.btn{padding:10px 18px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btn-teal{background:var(--teal);color:white;}
.btn-terra{background:var(--terra);color:white;}
.btn-success{background:var(--success);color:white;}
.btn-purple{background:var(--purple);color:white;}
.btn-ghost{background:var(--card2);border:1px solid var(--border2);color:var(--muted);}
.btn-full{width:100%;padding:14px;font-family:'Caveat',cursive;font-size:20px;font-weight:700;border-radius:12px;border:none;cursor:pointer;}
.btn-cancel{width:100%;padding:12px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:4px;}
/* FAB */
.fab{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);right:20px;width:56px;height:56px;border-radius:50%;border:none;color:white;font-size:28px;cursor:pointer;z-index:90;display:flex;align-items:center;justify-content:center;transition:transform .15s;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.fab:active{transform:scale(0.92);}
/* Toast */
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--card2);color:var(--ink);border:1px solid var(--border2);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* Badges */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;}
.badge-teal{background:var(--teal-pale);color:var(--teal);}
.badge-terra{background:var(--terra-pale);color:var(--terra);}
.badge-success{background:var(--success-pale);color:var(--success);}
.badge-warn{background:var(--warn-pale);color:var(--warn);}
.badge-purple{background:var(--purple-pale);color:var(--purple);}
/* Icon btn */
.ibtn{background:none;border:none;font-size:16px;cursor:pointer;padding:4px;line-height:1;}
/* Empty state */
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
/* Auth overlay */
#auth-overlay{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:20px;padding:40px;}
#auth-overlay h1{font-family:'Caveat',cursive;font-size:28px;color:var(--ink);font-weight:700;text-align:center;}
#auth-overlay p{font-size:13px;color:var(--muted);text-align:center;max-width:280px;line-height:1.6;}
#sign-in-btn{display:flex;align-items:center;gap:10px;background:white;color:#1e2e30;border:none;border-radius:12px;padding:14px 24px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
#sign-in-btn:active{transform:scale(0.97);}
#sign-in-btn svg{width:20px;height:20px;flex-shrink:0;}
#app{display:none;min-height:100dvh;flex-direction:column;}
#app.visible{display:flex;}
.stego-wrap{width:72px;height:72px;border-radius:50%;background:var(--card);border:2px solid var(--teal-dim);display:flex;align-items:center;justify-content:center;}


.abar{border-bottom-color:var(--success);}
.notif-btn{background:var(--card2);border:1px solid var(--border2);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;padding:7px 12px;border-radius:8px;cursor:pointer;}
.notif-btn.on{background:var(--success-pale);border-color:rgba(45,154,95,.4);color:var(--success);}
.alert-bar{background:var(--warn-pale);border:1px solid rgba(212,144,10,.4);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.alert-bar.hidden{display:none;}
.alert-txt{flex:1;font-size:13px;color:var(--warn);font-weight:500;}
.statbar3{grid-template-columns:1fr 1fr 1fr;}
.pcard{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;}
.pcard.needs{border-color:rgba(212,144,10,.5);background:rgba(212,144,10,.03);}
.pcard.overdue{border-color:rgba(196,103,63,.5);background:rgba(196,103,63,.03);}
.pemoji{width:52px;height:52px;border-radius:12px;background:var(--success-pale);border:1px solid rgba(45,154,95,.2);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.pinfo{flex:1;min-width:0;}
.pname{font-weight:700;font-size:15px;}
.pspecies{font-size:12px;color:var(--muted);font-style:italic;margin-top:1px;}
.ploc{font-size:11px;color:var(--muted2);margin-top:2px;}
.psched{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;}
.pbadge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--success-pale);color:var(--success);}
.pbadge.w{background:var(--warn-pale);color:var(--warn);}
.pbadge.o{background:var(--terra-pale);color:var(--terra);}
.plast{font-size:11px;color:var(--muted2);}
.pacts{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;}
.wbtn{background:var(--teal);border:none;color:white;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:8px 14px;border-radius:10px;cursor:pointer;}
.wbtn:active{opacity:.8;}
/* Emoji picker */
.epicker{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0;}
.eopt{font-size:24px;cursor:pointer;padding:6px;border-radius:8px;border:2px solid transparent;}
.eopt.sel{border-color:var(--success);background:var(--success-pale);}
/* Name row */
.name-row{display:flex;gap:8px;align-items:flex-end;}
.name-row input{flex:1;}
.surprise-btn{background:var(--teal-pale);border:1px solid var(--teal-dim);color:var(--teal);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:10px 12px;border-radius:10px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.surprise-btn:active{opacity:.8;}

</style>
</head>

<script>

const CLIENT_ID = '1049044356656-ecjtelk23gknpf1hc7kp3jt2kue56mlg.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';
let accessToken = null;

async function initAuth(tokenKey) {
  const s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  document.head.appendChild(s);
  await new Promise(r => s.onload = r);
  const stored = localStorage.getItem(tokenKey);
  if (stored) { accessToken = stored; showApp(); return; }
  document.getElementById('sign-in-btn').onclick = () => {
    google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: r => {
        if (r.access_token) {
          accessToken = r.access_token;
          localStorage.setItem(tokenKey, r.access_token);
          showApp();
        }
      }
    }).requestAccessToken({prompt:''});
  };
}

function signOut(tokenKey) {
  accessToken = null;
  localStorage.removeItem(tokenKey);
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-overlay').style.display='flex';
}

async function sheetsGet(range, sid) {
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(range)}`,{headers:{Authorization:`Bearer ${accessToken}`}});
  if(!r.ok) throw new Error(r.status);
  return (await r.json()).values || [];
}
async function sheetsPut(range, values, sid) {
  return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,{method:'PUT',headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({range,majorDimension:'ROWS',values})});
}
async function sheetsAppend(range, values, sid) {
  return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,{method:'POST',headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({range,majorDimension:'ROWS',values})});
}
async function sheetsClear(range, sid) {
  return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(range)}:clear`,{method:'POST',headers:{Authorization:`Bearer ${accessToken}`}});
}
async function getSheetTitles(sid) {
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}`,{headers:{Authorization:`Bearer ${accessToken}`}});
  return (await r.json()).sheets.map(s=>s.properties.title);
}
async function addSheetTab(title, sid) {
  return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}:batchUpdate`,{method:'POST',headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({requests:[{addSheet:{properties:{title}}}]})});
}

let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2500);}


const PLANTS_SID = '1m_zVkymi7Vl8GzkIahpqvXU1WG_B1rAVYvtplCin838';
const PLANT_NAMES = ["Spike", "Fluffy", "Professor Green", "Se\u00f1or Leafy", "Duchess", "Barnaby", "Wellington", "Clementine", "Reginald", "Beatrice", "Sir Droops-a-Lot", "Countess Fern", "Mortimer", "Priscilla", "Archibald", "Lavinia", "Captain Photon", "Theodora", "Biscuit", "Mildred", "Horatio", "Zelda", "Montgomery", "Seraphina", "Cornelius", "Petunia", "Bartholomew", "Ingrid", "Ptolemy", "Gertrude", "Maximilian", "Eugenia", "Thaddeus", "Millicent", "Prickles McGee", "Lady Fernsworth", "General Chlorophyll", "Baroness Bloom", "Sir Tangles", "Madame Frond", "Duke of Droop", "Princess Petal", "Count Chloro", "The Magnificent Leafington", "Empress Spiky", "Reverend Roots", "Admiral Aloe", "Queen Verdant", "Lord Snoot", "Madam Wilts-No-More"];
let plants = [];
let notifEnabled = localStorage.getItem('plant_notif')==='1';

async function showApp() {
  document.getElementById('auth-overlay').style.display='none';
  document.getElementById('app').classList.add('visible');
  await ensurePlantsSheet();
  await loadPlants();
  render();
  if(notifEnabled && Notification.permission==='granted') scheduleReminders();
}

async function ensurePlantsSheet() {
  try {
    const sheets = await getSheetTitles(PLANTS_SID);
    if(!sheets.includes('Plants')) {
      await addSheetTab('Plants', PLANTS_SID);
      await sheetsPut('Plants!A1:H1', [['ID','Name','Emoji','Species','Location','WaterEvery','LastWatered','Notes']], PLANTS_SID);
    }
  } catch(e) { console.error(e); }
}

async function loadPlants() {
  try {
    const rows = await sheetsGet('Plants!A2:H1000', PLANTS_SID);
    plants = rows.filter(r=>r[0]).map(r=>({
      id:r[0]||'', name:r[1]||'', emoji:r[2]||'🌱', species:r[3]||'',
      location:r[4]||'', waterEvery:r[5]?parseInt(r[5]):null,
      lastWatered:r[6]||null, notes:r[7]||'', _row:null
    }));
    plants.forEach((p,i)=>p._row=i+2);
    localStorage.setItem('cgt_plants', JSON.stringify(plants));
  } catch(e) { plants=JSON.parse(localStorage.getItem('cgt_plants')||'[]'); }
}

async function savePlantToSheet(p, isNew) {
  const row = [p.id,p.name,p.emoji,p.species,p.location,p.waterEvery||'',p.lastWatered||'',p.notes];
  if(isNew) {
    await sheetsAppend('Plants!A2:H', [row], PLANTS_SID);
    const rows = await sheetsGet('Plants!A2:A1000', PLANTS_SID);
    p._row = rows.length + 1;
  } else {
    await sheetsPut(`Plants!A${p._row}:H${p._row}`, [row], PLANTS_SID);
  }
  localStorage.setItem('cgt_plants', JSON.stringify(plants));
}

async function deletePlantFromSheet(p) {
  if(p._row) await sheetsClear(`Plants!A${p._row}:H${p._row}`, PLANTS_SID);
  localStorage.setItem('cgt_plants', JSON.stringify(plants));
}

function today() { return new Date().toISOString().split('T')[0]; }
function addDays(d,n) { const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0]; }
function daysDiff(a,b) { return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/864e5); }
function getStatus(p) {
  if(!p.lastWatered||!p.waterEvery)return'unknown';
  const diff=daysDiff(today(),addDays(p.lastWatered,parseInt(p.waterEvery)));
  if(diff<0)return'overdue';if(diff===0)return'today';if(diff<=2)return'soon';return'ok';
}
function getLabel(p) {
  if(!p.lastWatered||!p.waterEvery)return{text:'No schedule',cls:''};
  const next=addDays(p.lastWatered,parseInt(p.waterEvery));
  const diff=daysDiff(today(),next);
  if(diff<0)return{text:`${Math.abs(diff)}d overdue 🚨`,cls:'o'};
  if(diff===0)return{text:'Water today! 💧',cls:'w'};
  if(diff<=2)return{text:`Water in ${diff}d`,cls:'w'};
  return{text:`Next: ${next}`,cls:''};
}

function plantCardHTML(p) {
  const s=getStatus(p), lbl=getLabel(p);
  const cls=s==='overdue'?'overdue':(s==='today'||s==='soon')?'needs':'';
  return`<div class="pcard ${cls}">
    <div class="pemoji">${p.emoji||'🌱'}</div>
    <div class="pinfo">
      <div class="pname">${p.name}</div>
      ${p.species?`<div class="pspecies">${p.species}</div>`:''}
      ${p.location?`<div class="ploc">📍 ${p.location}</div>`:''}
      <div class="psched">
        ${lbl.text?`<span class="pbadge ${lbl.cls}">${lbl.text}</span>`:''}
        ${p.lastWatered?`<span class="plast">Last: ${p.lastWatered}</span>`:''}
      </div>
      ${p.notes?`<div style="font-size:11px;color:var(--muted2);margin-top:4px;">${p.notes}</div>`:''}
    </div>
    <div class="pacts">
      <button class="wbtn" onclick="waterPlant('${p.id}')">💧 Water</button>
      <button class="ibtn" onclick="editPlant('${p.id}')">✏️</button>
      <button class="ibtn" onclick="deletePlant('${p.id}')">🗑️</button>
    </div>
  </div>`;
}

function render() {
  const nw=plants.filter(p=>['overdue','today','soon'].includes(getStatus(p)));
  const ok=plants.filter(p=>getStatus(p)==='ok');
  document.getElementById('stTotal').textContent=plants.length;
  document.getElementById('stOk').textContent=ok.length;
  document.getElementById('stNeed').textContent=nw.length;
  if(nw.length){document.getElementById('alertBar').classList.remove('hidden');document.getElementById('alertTxt').textContent=nw.length===1?`${nw[0].name} needs water!`:`${nw.length} plants need water!`;}
  else document.getElementById('alertBar').classList.add('hidden');
  const ns=document.getElementById('needsSection');
  if(nw.length){ns.style.display='';document.getElementById('needsList').innerHTML=nw.map(plantCardHTML).join('');}
  else ns.style.display='none';
  const list=document.getElementById('plantList');
  if(!plants.length){list.innerHTML='';document.getElementById('emptyState').classList.remove('hidden');}
  else{document.getElementById('emptyState').classList.add('hidden');list.innerHTML=plants.map(plantCardHTML).join('');}
  const nb=document.getElementById('notifBtn');
  nb.textContent=notifEnabled?'🔔 Reminders On':'Enable Reminders 🔔';
  nb.className='notif-btn'+(notifEnabled?' on':'');
}

async function waterPlant(id) {
  const p=plants.find(x=>x.id===id);if(!p)return;
  p.lastWatered=today();
  await savePlantToSheet(p,false);
  render(); toast('💧 '+p.name+' watered!');
}

async function deletePlant(id) {
  if(!confirm('Remove this plant?'))return;
  const p=plants.find(x=>x.id===id);if(!p)return;
  await deletePlantFromSheet(p);
  plants=plants.filter(x=>x.id!==id);
  render(); toast('Plant removed');
}

function randomName() {
  const n=PLANT_NAMES[Math.floor(Math.random()*PLANT_NAMES.length)];
  document.getElementById('plantName').value=n;
  toast('🎲 '+n+'!');
}

function initEmojiPicker(cur) {
  const emojis=['🌱','🪴','🌿','🍀','☘️','🌵','🌾','🌺','🌸','🌻','🌹','🪷','🍃','🌳','🌴','🪸','🎋','🎍','🍄','🌊'];
  document.getElementById('emojiPicker').innerHTML=emojis.map(e=>`<span class="eopt ${e===cur?'sel':''}" onclick="selectEmoji('${e}')">${e}</span>`).join('');
}
function selectEmoji(e){document.getElementById('selectedEmoji').value=e;document.querySelectorAll('.eopt').forEach(el=>el.classList.toggle('sel',el.textContent===e));}

function openAdd(){
  document.getElementById('modalTitle').textContent='Add Plant';
  document.getElementById('plantId').value='';
  ['plantName','plantSpecies','plantLocation','waterEvery','plantNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('lastWatered').value=today();
  document.getElementById('selectedEmoji').value='🌱';
  initEmojiPicker('🌱');
  document.getElementById('addModal').classList.add('open');
}

function editPlant(id){
  const p=plants.find(x=>x.id===id);if(!p)return;
  document.getElementById('modalTitle').textContent='Edit Plant';
  document.getElementById('plantId').value=p.id;
  document.getElementById('plantName').value=p.name||'';
  document.getElementById('plantSpecies').value=p.species||'';
  document.getElementById('plantLocation').value=p.location||'';
  document.getElementById('waterEvery').value=p.waterEvery||'';
  document.getElementById('lastWatered').value=p.lastWatered||today();
  document.getElementById('plantNotes').value=p.notes||'';
  document.getElementById('selectedEmoji').value=p.emoji||'🌱';
  initEmojiPicker(p.emoji||'🌱');
  document.getElementById('addModal').classList.add('open');
}

function closeModal(){document.getElementById('addModal').classList.remove('open');}

async function savePlant(){
  const name=document.getElementById('plantName').value.trim();
  if(!name){toast('Please enter a plant name');return;}
  const id=document.getElementById('plantId').value||Date.now().toString();
  const idx=plants.findIndex(p=>p.id===id);
  const entry={id,name,emoji:document.getElementById('selectedEmoji').value,
    species:document.getElementById('plantSpecies').value.trim(),
    location:document.getElementById('plantLocation').value.trim(),
    waterEvery:parseInt(document.getElementById('waterEvery').value)||null,
    lastWatered:document.getElementById('lastWatered').value||null,
    notes:document.getElementById('plantNotes').value.trim(),
    _row: idx>=0?plants[idx]._row:null};
  if(idx>=0)plants[idx]=entry;else plants.push(entry);
  closeModal();
  try{await savePlantToSheet(entry,idx<0);toast(idx>=0?'Updated!':entry.emoji+' '+name+' added!');}
  catch(e){toast('Saved locally — sync failed');}
  render();
}

async function requestNotifs(){
  if(!('Notification'in window)){toast('Notifications not supported');return;}
  if(Notification.permission==='granted'){notifEnabled=true;localStorage.setItem('plant_notif','1');scheduleReminders();toast('🔔 Reminders enabled!');render();return;}
  const p=await Notification.requestPermission();
  if(p==='granted'){notifEnabled=true;localStorage.setItem('plant_notif','1');scheduleReminders();toast('🔔 Reminders enabled!');render();}
  else toast('Notifications blocked — check browser settings');
}

function scheduleReminders(){
  checkAndNotify();
  const now=new Date(),t=new Date(now);
  t.setHours(8,0,0,0);if(t<=now)t.setDate(t.getDate()+1);
  setTimeout(()=>{checkAndNotify();setInterval(checkAndNotify,864e5);},t-now);
}

function checkAndNotify(){
  if(!notifEnabled||Notification.permission!=='granted')return;
  const need=plants.filter(p=>['overdue','today'].includes(getStatus(p)));
  if(!need.length)return;
  const last=localStorage.getItem('last_plant_notif');
  const tod=today();if(last===tod)return;
  localStorage.setItem('last_plant_notif',tod);
  new Notification('💧 Time to water!',{body:need.map(p=>p.emoji+' '+p.name).join(', '),icon:'/casgrahtools/icon.svg',tag:'plant-reminder',data:{url:'/casgrahtools/plants.html'}});
}

document.getElementById('addModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
initAuth('cgt_token');
</script></body></html>
